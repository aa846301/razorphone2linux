%YAML 1.2
---
$id: http://devicetree.org/schemas/display/panel/novatek,nt36830.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Novatek NT36830 dual-DSI display panel

maintainers:
  - Dino Chang <dino.chang@cimforce.com>

description: |
  The Novatek NT36830 is a dual-DSI display controller used by the
  1440x2560 AMOLED panel in the Razer Phone 2. Each DSI link drives one
  720-pixel half of the panel and uses VESA DSC 1.1.

properties:
  compatible:
    items:
      - const: razer,aura-nt36830
      - const: novatek,nt36830

  reg:
    maxItems: 1

  reset-gpios:
    maxItems: 1

  te-gpios:
    maxItems: 1

  vddio-supply:
    description: I/O supply

  vci-supply:
    description: AMOLED analog supply

  poc-supply:
    description: Panel-on-chip supply

required:
  - compatible
  - reg
  - reset-gpios
  - vddio-supply
  - vci-supply
  - poc-supply
  - ports

allOf:
  - $ref: panel-common-dual.yaml#

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    dsi {
        #address-cells = <1>;
        #size-cells = <0>;

        panel@0 {
            compatible = "razer,aura-nt36830", "novatek,nt36830";
            reg = <0>;

            vddio-supply = <&vreg_l14a_1p88>;
            vci-supply = <&panel_vci_3v3>;
            poc-supply = <&panel_vddi_poc_1p8>;
            reset-gpios = <&tlmm 6 GPIO_ACTIVE_LOW>;
            rotation = <90>;

            ports {
                #address-cells = <1>;
                #size-cells = <0>;

                port@0 {
                    reg = <0>;
                    panel_in_dsi0: endpoint {
                        remote-endpoint = <&dsi0_out>;
                    };
                };

                port@1 {
                    reg = <1>;
                    panel_in_dsi1: endpoint {
                        remote-endpoint = <&dsi1_out>;
                    };
                };
            };
        };
    };

...
